<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播间里程碑 - vitUber</title>
    <!-- Socket.IO -->
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1920px;
            height: 1080px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: white;
            overflow: hidden;
            position: relative;
        }

        /* 星星背景 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 粒子特效 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #FFD700;
            border-radius: 50%;
            animation: float 4s infinite ease-in-out;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }

        /* 顶部标题 */
        .header {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }

        .level-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            display: inline-flex;
            align-items: center;
            gap: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .level-icon {
            font-size: 40px;
        }

        /* 进度条 */
        .progress-section {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            width: 700px;
            text-align: center;
            z-index: 100;
        }

        .progress-bar-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 35px;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, 
                #f093fb 0%, 
                #f5576c 25%,
                #4facfe 50%,
                #00f2fe 75%,
                #43e97b 100%
            );
            border-radius: 17px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 0 30px rgba(79, 172, 254, 0.6);
        }

        .progress-bar-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                transparent
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            margin-top: 15px;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .progress-percent {
            font-size: 28px;
            font-weight: bold;
            color: #4facfe;
        }

        /* 左侧统计 */
        .stats-left {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 100;
        }

        /* 右侧统计 */
        .stats-right {
            position: absolute;
            right: 60px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 25px;
            z-index: 100;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            width: 170px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.15);
        }

        .stat-icon {
            font-size: 45px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #fff 0%, #a8edea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
        }

        .stat-label {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 8px;
        }

        /* Miko站位区 */
        .character-area {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 650px;
            border: 3px dashed rgba(255, 255, 255, 0.15);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 10;
        }

        .character-hint {
            color: rgba(255, 255, 255, 0.25);
            font-size: 28px;
            text-align: center;
            line-height: 1.5;
        }

        /* 底部信息 */
        .footer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 50px;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 25px;
            border-radius: 25px;
            backdrop-filter: blur(5px);
        }

        /* 实时通知 */
        .notification {
            position: fixed;
            left: 50%;
            top: 35%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: #1a1a2e;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(67, 233, 123, 0.4);
        }

        .notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .notification.gift {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        /* 升级动画 */
        .level-up-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .level-up-content {
            text-align: center;
            animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            50% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .level-up-title {
            font-size: 56px;
            color: #FFD700;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.8);
            margin-bottom: 30px;
        }

        .level-up-badge {
            font-size: 100px;
            margin: 30px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .level-up-name {
            font-size: 42px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 50px;
            border-radius: 50px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        /* 连接状态指示器 */
        .connection-status {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #43e97b;
            box-shadow: 0 0 10px #43e97b;
            z-index: 3000;
            transition: all 0.3s;
        }

        .connection-status.disconnected {
            background: #f5576c;
            box-shadow: 0 0 10px #f5576c;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* 最近事件滚动 */
        .recent-events {
            position: absolute;
            bottom: 150px;
            left: 60px;
            width: 300px;
            z-index: 100;
        }

        .event-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0;
            animation: slideIn 0.3s forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <!-- 星星背景 -->
    <div class="stars" id="stars"></div>

    <!-- 粒子特效 -->
    <div class="particles" id="particles"></div>

    <!-- 连接状态 -->
    <div class="connection-status" id="connStatus"></div>

    <!-- 顶部等级 -->
    <div class="header">
        <div class="level-badge">
            <span class="level-icon" id="levelIcon">🌱</span>
            <span id="levelText">Lv.1 初入直播</span>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress-section">
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="progress-text">
            距离升级还需 <span class="progress-percent" id="xpToNext">100</span> 经验值
        </div>
    </div>

    <!-- 左侧统计 -->
    <div class="stats-left">
        <div class="stat-card">
            <div class="stat-icon">👥</div>
            <div class="stat-value" id="enterCount">0</div>
            <div class="stat-label">今日入场</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">💬</div>
            <div class="stat-value" id="chatCount">0</div>
            <div class="stat-label">互动回复</div>
        </div>
    </div>

    <!-- 右侧统计 -->
    <div class="stats-right">
        <div class="stat-card">
            <div class="stat-icon">🎁</div>
            <div class="stat-value" id="giftCount">0</div>
            <div class="stat-label">收到礼物</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon">⭐</div>
            <div class="stat-value" id="totalXP">0</div>
            <div class="stat-label">总经验</div>
        </div>
    </div>

    <!-- Miko站位区 -->
    <div class="character-area" id="characterArea">
        <div class="character-hint" id="characterHint">
            🎭 Miko 站位区<br>
            800 × 650 px<br>
            <small>VTube Studio 放这里</small>
        </div>
    </div>

    <!-- 最近事件 -->
    <div class="recent-events" id="recentEvents"></div>

    <!-- 底部信息 -->
    <div class="footer">
        <div class="footer-item">
            <span>🔥</span>
            <span>已直播 <span id="streamTime">0小时0分</span></span>
        </div>
        <div class="footer-item">
            <span>📅</span>
            <span>连续 <span id="streakDays">1</span> 天</span>
        </div>
        <div class="footer-item">
            <span>📈</span>
            <span>今日人气 <span id="popularity">🔥</span></span>
        </div>
    </div>

    <!-- 实时通知 -->
    <div class="notification" id="notification"></div>

    <!-- 升级动画 -->
    <div class="level-up-overlay" id="levelUpOverlay">
        <div class="level-up-content">
            <div class="level-up-title">🎉 恭喜升级！ 🎉</div>
            <div class="level-up-badge" id="levelUpIcon">🌟</div>
            <div class="level-up-name" id="levelUpName">Lv.2 小透明</div>
        </div>
    </div>

    <script>
        // 配置
        const SERVER_URL = window.location.origin;
        
        // 等级映射
        const LEVELS = {
            1: { name: "初入直播", icon: "🌱", color: "#90EE90" },
            2: { name: "小透明", icon: "🌿", color: "#98FB98" },
            3: { name: "话痨新人", icon: "🌸", color: "#FFB6C1" },
            4: { name: "互动达人", icon: "🌺", color: "#FF69B4" },
            5: { name: "人气主播", icon: "🌻", color: "#FFD700" },
            6: { name: "直播明星", icon: "🌟", color: "#FFA500" },
            7: { name: "顶流存在", icon: "👑", color: "#FF6347" },
            8: { name: "传奇主播", icon: "🏆", color: "#FFD700" }
        };

        let lastLevel = 1;
        let socket = null;

        // 生成星星
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                container.appendChild(star);
            }
        }

        // 生成粒子
        function createParticles() {
            const container = document.getElementById('particles');
            setInterval(() => {
                if (document.hidden) return;
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (3 + Math.random() * 3) + 's';
                p.style.background = `hsl(${Math.random() * 60 + 40}, 100%, 60%)`;
                container.appendChild(p);
                setTimeout(() => p.remove(), 6000);
            }, 800);
        }

        // 连接 WebSocket
        function connectSocket() {
            const statusEl = document.getElementById('connStatus');
            
            socket = io(SERVER_URL);
            
            socket.on('connect', () => {
                console.log('✅ 已连接到服务器');
                statusEl.classList.remove('disconnected');
            });
            
            socket.on('disconnect', () => {
                console.log('❌ 与服务器断开');
                statusEl.classList.add('disconnected');
            });
            
            socket.on('init_data', (data) => {
                console.log('📊 初始数据:', data);
                updateDisplay(data);
            });
            
            socket.on('live_event', (event) => {
                console.log('🎯 实时事件:', event);
                handleLiveEvent(event);
            });
            
            socket.on('level_up', (data) => {
                console.log('🎉 升级:', data);
                showLevelUp(data);
            });
        }

        // 更新显示
        function updateDisplay(data) {
            if (!data) return;
            
            lastLevel = data.current_level;
            
            // 等级信息
            const levelInfo = LEVELS[data.current_level] || LEVELS[1];
            document.getElementById('levelIcon').textContent = levelInfo.icon;
            document.getElementById('levelText').textContent = 
                `Lv.${data.current_level} ${levelInfo.name}`;
            
            // 进度条
            document.getElementById('progressBar').style.width = 
                `${data.progress_percent || 0}%`;
            document.getElementById('xpToNext').textContent = 
                data.xp_to_next || 0;
            
            // 统计数据
            if (data.today) {
                document.getElementById('enterCount').textContent = 
                    data.today.enters || 0;
                document.getElementById('chatCount').textContent = 
                    data.today.chats || 0;
                document.getElementById('giftCount').textContent = 
                    data.today.gifts || 0;
            }
            document.getElementById('totalXP').textContent = 
                data.total_xp || 0;
            
            // 底部信息
            document.getElementById('streamTime').textContent = 
                data.stream_time || '0小时0分';
            document.getElementById('streakDays').textContent = 
                data.streak_days || 1;
        }

        // 处理实时事件
        function handleLiveEvent(event) {
            // 更新显示
            updateDisplay(event.current);
            
            // 显示通知
            const user = event.user || '有人';
            const text = {
                'enter': `${user} 进入直播间`,
                'chat': `${user} 发送弹幕`,
                'gift': `${user} 赠送礼物！`,
                'like': `${user} 点赞`
            }[event.type] || '新互动';
            
            showNotification(`+${event.xp_gained} XP ${text}`, 
                event.type === 'gift');
            
            // 添加最近事件
            addRecentEvent(text);
        }

        // 显示通知
        function showNotification(text, isGift = false) {
            const notif = document.getElementById('notification');
            notif.textContent = text;
            notif.className = 'notification' + (isGift ? ' gift' : '');
            
            setTimeout(() => notif.classList.add('show'), 10);
            setTimeout(() => notif.classList.remove('show'), 2500);
        }

        // 显示升级动画
        function showLevelUp(data) {
            const levelInfo = LEVELS[data.new_level] || LEVELS[1];
            document.getElementById('levelUpIcon').textContent = levelInfo.icon;
            document.getElementById('levelUpName').textContent = 
                `Lv.${data.new_level} ${levelInfo.name}`;
            
            const overlay = document.getElementById('levelUpOverlay');
            overlay.style.display = 'flex';
            
            // 升级时隐藏站位提示
            document.getElementById('characterHint').style.display = 'none';
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 4000);
        }

        // 添加最近事件
        function addRecentEvent(text) {
            const container = document.getElementById('recentEvents');
            const item = document.createElement('div');
            item.className = 'event-item';
            item.textContent = `${new Date().toLocaleTimeString()} ${text}`;
            container.insertBefore(item, container.firstChild);
            
            // 只保留5条
            while (container.children.length > 5) {
                container.removeChild(container.lastChild);
            }
        }

        // 初始化
        function init() {
            createStars();
            createParticles();
            connectSocket();
            
            // 5秒后隐藏站位提示
            setTimeout(() => {
                document.getElementById('characterHint').style.display = 'none';
            }, 5000);
            
            // 定时请求更新（备用，万一WebSocket失败）
            setInterval(() => {
                if (socket && socket.connected) {
                    socket.emit('request_update');
                }
            }, 5000);
        }

        // 启动
        init();
    </script>
</body>
</html>
